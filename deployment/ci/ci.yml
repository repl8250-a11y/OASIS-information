name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.20

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run linters
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          ruff check . || true

      - name: Install dependencies (python services)
        run: |
          pip install -r services/knowledge-graph-service/requirements.txt || true
          pip install -r services/novelty-engine/requirements.txt || true

      - name: Install dependencies (node)
        run: |
          cd frontend && npm ci || true
          cd services/paper-service && npm ci || true

      - name: Run unit tests (python)
        env:
          NOVELTY_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: |
          pip install pytest httpx
          pytest -q

      - name: Run go tests
        run: |
          go test ./... || true

      - name: Container image scan
        uses: aquasecurity/trivy-action@v1
        with:
          format: 'table'
          exit-code: '1'
          vuln-type: 'os,library'
